---
layout: default
---

<article style="max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px;">
    <h1>{{ page.title }}</h1>
    <p class="post-date">Dipublikasikan pada {{ page.date | date: "%d %B %Y" }}</p>
    
    <div class="post-body">
        {{ content }}
    </div>
    
    <hr>
    <a href="{{ '/' | relative_url }}" style="color: #ff6b35; text-decoration: none;">← Kembali ke Home</a>
</article>
